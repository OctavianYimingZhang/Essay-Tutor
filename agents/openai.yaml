interface:
  display_name: "Essay Tutor"
  short_description: "Route coursework to focused tutor skills"
  default_prompt: "Use $essay-tutor as the Essay Tutor Index to route the request to focused academic coursework skills, then in Codex Plan Mode diagnose the assignment materials, display the relevant brief or decision plan before every Asking Questions batch, generate dynamic request_user_input payloads with scripts/build_intake_questions.py, call request_user_input for plan-changing questions including task type, citation count plus density, context-generated output format, lab-report analysis tool and method, poster canvas and message hierarchy, presentation timing and notes, website interaction model and platform constraints, figure purpose and source basis, figure legend depth and source or permission note, and DOCX or LaTeX formatting details when needed, build a locked brief, review each paragraph-level section plan with real paragraph labels, paragraph output paths, proof logic, and task-specific tradeoff options where prose sections exist, review critical moves as insertions into body paragraphs or Discussion after the paragraph plan is agreed when evaluative writing is needed, draft or revise from that plan, validate claim-level citations, analysis outputs, visual requirements, figure legends, critical analysis, and submit-ready formatted DOCX output when needed."
