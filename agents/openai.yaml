interface:
  display_name: "Essay Tutor"
  short_description: "Tutor academic writing with material diagnosis, deep questioning, paragraph-level section planning, critical-move planning, citation QA, and DOCX checks"
  default_prompt: "Use $essay-tutor in Codex Plan Mode to diagnose the assignment materials, display the relevant brief or decision plan before every Asking Questions batch, generate dynamic request_user_input payloads with scripts/build_intake_questions.py, call request_user_input for plan-changing questions including citation count plus density, context-generated output format, and DOCX or LaTeX formatting details when needed, build a locked brief, review each paragraph-level section plan with real paragraph labels, paragraph output paths, proof logic, and task-specific tradeoff options, review critical moves as insertions into body paragraphs or Discussion after the paragraph plan is agreed, draft or revise from that plan, validate claim-level citations and critical analysis, and visually QA submit-ready formatted DOCX output when needed."
